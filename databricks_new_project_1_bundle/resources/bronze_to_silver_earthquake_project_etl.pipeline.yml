# The main pipeline for databricks_new_project_1_bundle

resources:
  pipelines:
    bronze_to_silver_earthquake_project_etl:
      name: databricks_new_project_1_bundle_etl
      configuration:
        catalog: ${var.catalog}
      root_path: "../src/databricks_new_project_1_bundle_etl"

      libraries:
        - glob:
            include: ../src/databricks_new_project_1_bundle_etl/transformations/**
      
      schema: silver
      continuous: false
      development: false
      photon: true
      channel: CURRENT
      catalog: ${var.catalog}
      serverless: true
      run_as:
        # service_principal_name: ${var.spn_id}
        user_name: adhyatmmishra27@gmail.com

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
