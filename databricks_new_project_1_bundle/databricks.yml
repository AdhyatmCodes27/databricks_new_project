      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-574a2068-d7c4.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/adhyatmmishra27@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/adhyatmmishra27@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: project_production
      schema: prod
      warehouse_id: 77a55b0f4d8a5e78
